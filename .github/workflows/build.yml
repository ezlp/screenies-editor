# build.yml — runs on every push & PR.
# Tests the Rust engine (screenies-core). The Tauri frontend was removed in
# the 2.0 cutover to Qt; the qt/ shell is excluded from the default workspace
# (it needs a Qt6 toolchain), so this stays a fast, dependency-light check.
# Qt build/packaging CI arrives with migration phase 6 (docs/2.0-MIGRATION.md).

name: Build Check

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  check:
    name: Rust check (core)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Rust tests (workspace)
        run: cargo test --workspace
