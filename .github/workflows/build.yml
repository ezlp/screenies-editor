# build.yml — runs on every push & PR. Two fast checks:
#   • core   — build + unit-test the engine (parser, render incl. blur/pixelate
#              + layout, chatlog_library, gallery). No TypeScript/Node.
#   • native — `cargo check` the egui shell so a compile error surfaces on
#              every push (no tag / release build needed). This is the quick
#              "does it build?" signal; native-preview.yml does the full
#              release build + packaging on tags.

name: Build Check

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  check:
    name: Rust check (core)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test the engine (core)
        run: cargo test -p screenies-core

  native-check:
    name: Native compile check (egui)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: GUI system deps (egui + rfd/GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: cargo check (native egui shell)
        working-directory: native
        run: cargo check
