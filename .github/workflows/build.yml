# build.yml — runs on every push & PR.
# 2.0 is a native Rust (egui) app, so this check is Rust-only: it builds and
# tests `core` (the engine — parser, render incl. blur/pixelate + layout,
# chatlog_library, gallery). No TypeScript/Node here.
#
# NOT built by this check:
#   • src-tauri/ — the frozen 1.x safety-net app. It needs the TS/Vite `dist`
#     bundle to compile, so its installers are still cut by release.yml on tags.
#   • native/   — the 2.0 egui shell (excluded from the workspace; needs GUI
#     system-deps). Its own CI arrives in migration phase 6.

name: Build Check

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  check:
    name: Rust check (core)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test the engine (core)
        run: cargo test -p screenies-core
