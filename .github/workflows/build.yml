# build.yml — runs on every push & PR.
# 2.0 is a native Rust (egui) app, so this check is Rust-only: it builds and
# tests `core` (the engine — parser, render incl. blur/pixelate + layout,
# chatlog_library, gallery). No TypeScript/Node here.
#
# native/ (the 2.0 egui shell) is excluded from the default workspace and needs
# GUI system-deps, so it isn't built here — it's compiled + packaged by
# native-preview.yml (which also serves as its build verification).

name: Build Check

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:

jobs:
  check:
    name: Rust check (core)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Test the engine (core)
        run: cargo test -p screenies-core
