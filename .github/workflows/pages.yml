name: Deploy website (GitHub Pages)

# Publishes the static site in site/ to GitHub Pages.
# The configure-pages step self-enables Pages (enablement: true), so no manual
# setup is needed. If org policy blocks that, set repo Settings → Pages →
# Build and deployment → Source: "GitHub Actions" once, then re-run.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site (build_type: workflow) on first run,
          # so no manual repo Settings → Pages toggle is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
