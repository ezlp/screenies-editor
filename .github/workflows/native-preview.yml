# native-preview.yml — build the 2.0 native egui app and publish a downloadable
# PRE-RELEASE for testing. Trigger by pushing a `native-preview-*` tag (works
# from any branch), or via workflow_dispatch once this file is on the default
# branch.
#
# Also serves as build verification for native/ (excluded from the default
# workspace, so normal CI doesn't compile it).
#
# Artifacts:
#   • Windows: .exe
#   • Linux:   .deb (cargo-deb), .rpm (cargo-generate-rpm), and the raw binary.
#     The .deb declares real runtime deps (GTK3/OpenGL/…) via dpkg-shlibdeps.

name: Native preview (egui)

on:
  workflow_dispatch:
  push:
    tags:
      - "native-preview-*" # rolling preview builds
      - "v*" # all versioned releases (v2.*, v3.*, v4.*, etc.)

permissions:
  contents: write # create/update the pre-release

jobs:
  linux:
    name: Build Linux (.deb / .rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: GUI build deps (egui + rfd/GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      # Build the app FIRST so an egui compile error surfaces before packaging.
      - name: Build (release)
        working-directory: native
        run: cargo build --release

      # Compile the packagers from source to match system glibc exactly.
      - name: Install packagers
        run: |
          cargo install cargo-deb --version 3.1.0 || cargo install cargo-deb --git https://github.com/kornelski/cargo-deb.git
          cargo install cargo-generate-rpm --locked

      - name: Package .deb
        working-directory: native
        run: cargo deb --no-build

      - name: Package .rpm
        working-directory: native
        run: cargo generate-rpm

      - name: Build AppImage (best effort)
        continue-on-error: true
        working-directory: native
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -eux
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable target/release/screenies-native \
            --desktop-file assets/screenies-native.desktop \
            --icon-file assets/icon.png \
            --icon-filename screenies-native \
            --output appimage

      - name: Stage artifacts (copy direct files without zip)
        shell: bash
        run: |
          mkdir -p out
          cp native/target/release/screenies-native out/screenies-native-linux-x86_64
          cp native/target/debian/*.deb out/
          cp native/target/generate-rpm/*.rpm out/
          cp native/*.AppImage out/ 2>/dev/null || echo "no AppImage (best-effort step may have failed)"

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: out/

  windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Build (release)
        working-directory: native
        run: cargo build --release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp native/target/release/screenies-native.exe out/screenies-native-windows-x86_64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: out/

  release:
    name: Publish pre-release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'native-preview' }}
          name: ScreeniesEditor ${{ github.ref_name }}
          # Tags with a '-' (e.g. v2.0.0-alpha.2, native-preview-0.19) are
          # pre-releases; clean tags (v2.0.0) publish as a stable release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## ScreeniesEditor 4.0 — Release Notes

            **A major native Rust (egui) release featuring Dual-Tab Gallery, Smart Storyline Albums, ImgBB Cloud Uploader, Unified Fast-Editor, and Customizable Shortcuts.**

            ### 🌟 Key Features
            - **Segmented Dual-Tab Gallery**: Separate browsing for **Source Shots** (raw screenshots) vs **Finished Edits** (SSRP artwork).
            - **Smart Albums & Storyline Logs**: Create custom narrative albums, write storyline descriptions, assign images, and filter gallery items by album.
            - **ImgBB Cloud Uploader**: Non-blocking background thread HTTP uploader (`ureq` + `rustls`), direct raw image URL display, and one-click clipboard copy (`📋`).
            - **Unified Fast-Editor UI & Shortcuts**: Single collapsible scrollable page mode (`Unified UI`), on-the-fly layout switcher (`🗂 Unified UI` / `🔲 Classic UI`), and custom hotkey mapping.
            - **Theme Engine**: 7 built-in themes, accent picker, and UI density mode (Cozy vs Compact).

            ### ⬇️ Download
            - **Windows:** `screenies-native-windows-x86_64.exe` — portable binary, just run it.
            - **Linux Binary:** `screenies-native-linux-x86_64` — raw executable (`chmod +x`).
            - **Debian / Ubuntu:** `*.deb` → `sudo apt install ./screenies-native_*.deb`
            - **Fedora / RHEL:** `*.rpm` → `sudo dnf install ./screenies-native-*.rpm`
            - **Any Linux:** `*.AppImage` (`chmod +x` then run).

            Hit a bug? Please open an issue.
          files: dist/**/*
