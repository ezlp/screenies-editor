# nightly.yml — on-demand DEV SNAPSHOT builds ("nightly" channel).
#
# Trigger:  Actions tab → "Nightly (dev snapshot)" → Run workflow.
#           Deliberately NOT on a cron schedule: a solo project doesn't
#           need daily builds of unchanged code — you press the button
#           when there's something worth testing.
# Result:   ONE rolling pre-release tagged `nightly` — each run replaces
#           the previous one, so testers always grab the same link.
#           Installer versions get a -nightly.<sha> suffix so a tester's
#           screenshot always tells you exactly which commit they ran.

name: Nightly (dev snapshot)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-nightly:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete previous nightly release + tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes || true
          git push origin :refs/tags/nightly || true

  build:
    needs: reset-nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            targets: ""
            cache-key: win-x64
          - platform: windows-latest
            args: "--target i686-pc-windows-msvc"
            targets: "i686-pc-windows-msvc"
            cache-key: win-x86
          - platform: ubuntu-22.04
            args: ""
            targets: ""
            cache-key: linux-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.cache-key }}

      - name: Install Tauri system deps (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Stamp nightly version (X.Y.Z-nightly.<sha>)
        shell: bash
        run: |
          SHA=$(git rev-parse --short HEAD)
          BASE=$(node -p "require('./package.json').version.split('-')[0]")
          V="$BASE-nightly.$SHA"
          echo "Nightly version: $V"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$V';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "
          # Cargo.toml: only the [package] version line (the first match)
          sed -i.bak "0,/^version = \".*\"$/s//version = \"$V\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install frontend deps
        run: npm install

      - name: Build & publish nightly
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: nightly
          releaseName: "Nightly — snapshot dev (tidak stabil)"
          releaseBody: |
            ⚠️ **Build percobaan dari kode terbaru — BUKAN rilis stabil.**
            Bisa berubah/rusak kapan saja. Untuk versi stabil, ambil dari
            release "Latest".

            Versi di dalam app memuat kode commit (mis. `-nightly.a1b2c3d`)
            — sebutkan itu saat melaporkan bug. Terima kasih sudah menguji! 🙏
          releaseDraft: false
          prerelease: true
