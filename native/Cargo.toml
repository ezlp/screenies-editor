# screenies-native — 🧪 EXPERIMENTAL egui shell (see docs/NATIVE-MIGRATION.md).
# Runs the SAME screenies-core pipeline with no webview: the preview you
# see IS compose::render — parity by identity. Not shipped in releases.
[package]
name = "screenies-native"
version = "0.1.0"
edition = "2021"
rust-version = "1.77"

[dependencies]
screenies-core = { path = "../core" }
eframe = "0.29"
rfd = "0.15"
image = "0.25"
base64 = "0.22"
ab_glyph = "0.2"
fontdb = "0.18"
