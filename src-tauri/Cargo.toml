[package]
name = "screenies-editor"
version = "0.8.0"
description = "ScreeniesEditor — Screenshot Roleplay editor for the SA-MP community"
authors = ["Isut Indraputra", "Claude (Anthropic)"]
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
fontdb = "0.18"
toml = "0.8"
tauri-plugin-dialog = "2"

# ── Arriving in later milestones (kept out of M1 so the first build stays lean) ──
# image = "0.25"                    # M3: decode/encode + filters
# cosmic-text = "0.12"              # M3: text layout & stroke for export
# arboard = "3"                     # M3: copy PNG to clipboard
# tauri-plugin-fs = "2"             # M3: file writes
# dirs = "5"                        # M4: config dir for settings/templates

[profile.release]
strip = true
lto = true
codegen-units = 1
panic = "abort"
